<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BookSpace — Онлайн-бронирование</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- ═══════════════════════════════════════════════════════
     SHARED/UI — дизайн-токены (Tailwind-style variables)
     Палитра: Minimal Dark + Indigo primary
     ═══════════════════════════════════════════════════════ -->
<style>
/* ── TOKEN SYSTEM ─────────────────────────────────────── */
:root {
  --primary:     #6366f1;
  --primary-2:   #818cf8;
  --primary-glow:rgba(99,102,241,0.22);
  --surface:     #0a0812;
  --surface-2:   #13101f;
  --surface-3:   #1c1830;
  --border:      rgba(255,255,255,0.08);
  --border-2:    rgba(255,255,255,0.14);
  --ink:         #f1f0f8;
  --muted:       #6b6980;
  --dim:         #9896b0;
  --success:     #34d399;
  --warning:     #fbbf24;
  --danger:      #f87171;
  --cyan:        #22d3ee;
  --font-display:'Inter', sans-serif;
  --font-body:   'Inter', sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px; --r-2xl: 30px;
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(99,102,241,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 100%, rgba(34,211,238,0.05) 0%, transparent 60%);
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

/* ── SHARED/UI COMPONENTS ────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

/* Button variants */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-body); font-weight: 600; cursor: pointer;
  border: none; outline: none; transition: all 0.18s; white-space: nowrap;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
.btn-sm  { font-size: 12px; padding: 7px 14px;  border-radius: var(--r-sm); }
.btn-md  { font-size: 14px; padding: 10px 20px; border-radius: var(--r-md); }
.btn-lg  { font-size: 15px; padding: 13px 28px; border-radius: var(--r-lg); }
.btn-primary  { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
.btn-ghost    { background: var(--surface-3); color: var(--ink); border: 1px solid var(--border-2); }
.btn-ghost:hover:not(:disabled) { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.35); color: var(--primary-2); }
.btn-danger   { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.22); }
.btn-full { width: 100%; }

/* Spinner */
.spinner { display: inline-block; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.2); border-top-color: currentColor; animation: spin 0.65s linear infinite; }
.spinner-sm { width: 14px; height: 14px; }
.spinner-md { width: 20px; height: 20px; }
.spinner-lg { width: 32px; height: 32px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Input */
.field-wrap { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--dim); letter-spacing: 0.7px; text-transform: uppercase; }
.field-input {
  background: var(--surface-3); border: 1px solid var(--border-2);
  border-radius: var(--r-sm); padding: 11px 14px;
  font-family: var(--font-body); font-size: 14px; color: var(--ink);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
}
.field-input:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px var(--primary-glow); }
.field-input::placeholder { color: var(--muted); }
.field-input.error { border-color: rgba(248,113,113,0.5); }
.field-error { font-size: 12px; color: var(--danger); }

/* Card */
.card {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r-xl); overflow: hidden;
  transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
}
.card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,0.35); }

/* Badge */
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; font-family: var(--font-mono); letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 9px; border-radius: 100px; }
.badge-CONFIRMED   { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
.badge-PENDING     { background: rgba(251,191,36,0.12);  color: var(--warning); border: 1px solid rgba(251,191,36,0.3); }
.badge-CANCELLED   { background: rgba(248,113,113,0.12); color: var(--danger);  border: 1px solid rgba(248,113,113,0.3); }
.badge-COMPLETED   { background: rgba(34,211,238,0.12);  color: var(--cyan);    border: 1px solid rgba(34,211,238,0.3); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center; padding: 16px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--surface-2); border: 1px solid var(--border-2);
  border-radius: var(--r-2xl) var(--r-2xl) var(--r-xl) var(--r-xl);
  width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(48px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head { padding: 22px 22px 0; display: flex; align-items: flex-start; justify-content: space-between; }
.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-3); border: 1px solid var(--border-2); color: var(--dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 18px 22px 22px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface-3); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); padding: 12px 18px;
  font-size: 14px; font-weight: 500; z-index: 600;
  display: flex; align-items: center; gap: 9px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; max-width: calc(100vw - 32px);
}
@keyframes toastIn { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.toast-success { border-color: rgba(52,211,153,0.35); }
.toast-error   { border-color: rgba(248,113,113,0.35); color: var(--danger); }

/* ── WIDGETS/HEADER ──────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(10,8,18,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-inner { display: flex; align-items: center; height: 60px; gap: 8px; }
.nav-logo { font-size: 18px; font-weight: 800; cursor: pointer; color: var(--ink); letter-spacing: -0.5px; }
.nav-logo span { color: var(--primary-2); }
.nav-links { display: flex; gap: 2px; margin-left: auto; }
.nav-link { font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: var(--r-sm); background: transparent; border: none; color: var(--muted); cursor: pointer; transition: all 0.15s; position: relative; }
.nav-link:hover { color: var(--ink); background: var(--surface-3); }
.nav-link.active { color: var(--ink); background: var(--surface-3); }
.nav-link.active::after { content: ''; position: absolute; bottom: -1px; left: 14px; right: 14px; height: 2px; background: var(--primary); border-radius: 2px 2px 0 0; }
.nav-badge { min-width: 18px; height: 18px; padding: 0 5px; background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
.nav-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--dim); }
.nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-glow); border: 1px solid rgba(99,102,241,0.4); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--primary-2); }

/* ── PAGES/HOME ──────────────────────────────────────── */
.hero { padding: 80px 0 56px; text-align: center; }
.hero-kicker { font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--primary-2); margin-bottom: 18px; }
.hero-h1 { font-size: clamp(36px,7vw,68px); font-weight: 800; line-height: 1.0; letter-spacing: -2px; margin-bottom: 16px; }
.hero-h1 .accent { background: linear-gradient(135deg, var(--primary), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-sub { font-size: 17px; color: var(--dim); max-width: 480px; margin: 0 auto 40px; }

/* Search bar */
.search-wrap { max-width: 680px; margin: 0 auto 20px; }
.search-bar { display: flex; align-items: center; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 100px; padding: 6px 6px 6px 22px; gap: 10px; transition: box-shadow 0.2s, border-color 0.2s; }
.search-bar:focus-within { border-color: rgba(99,102,241,0.4); box-shadow: 0 0 0 3px var(--primary-glow); }
.search-input { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: var(--ink); font-family: var(--font-body); }
.search-input::placeholder { color: var(--muted); }

/* Filters */
.filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 12px; }
.filter-btn { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border-2); background: var(--surface-2); color: var(--dim); cursor: pointer; transition: all 0.18s; }
.filter-btn:hover { color: var(--ink); border-color: rgba(99,102,241,0.3); }
.filter-btn.active { background: rgba(99,102,241,0.14); border-color: rgba(99,102,241,0.45); color: var(--primary-2); }

/* Stats row */
.stats-row { display: flex; justify-content: center; gap: 52px; margin-top: 44px; flex-wrap: wrap; }
.stat-num { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Listing grid */
.listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; padding-bottom: 60px; }

/* ── ENTITIES/LISTING CARD ───────────────────────────── */
.listing-card { cursor: pointer; }
.listing-card .card-img { height: 172px; background: var(--surface-3); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.listing-card .card-emoji { font-size: 60px; opacity: 0.12; }
.listing-card .card-city-tag { position: absolute; top: 10px; left: 10px; font-family: var(--font-mono); font-size: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 4px 9px; color: var(--ink); }
.listing-card .card-body { padding: 16px; }
.listing-card .card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
.listing-card .card-loc { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.listing-card .card-amenities { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.listing-card .amenity-pill { font-size: 11px; padding: 3px 8px; border-radius: 100px; background: var(--surface-3); border: 1px solid var(--border); color: var(--dim); }
.listing-card .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px; }
.listing-card .card-price { font-size: 17px; font-weight: 700; }
.listing-card .card-price-unit { font-size: 11px; color: var(--muted); font-weight: 400; }
.listing-card .card-rating { font-size: 12px; font-weight: 600; color: var(--warning); display: flex; align-items: center; gap: 3px; }

/* ── PAGES/LISTING ───────────────────────────────────── */
.listing-page { padding: 32px 0 80px; }
.listing-detail-grid { display: grid; grid-template-columns: 1fr 380px; gap: 28px; align-items: start; }
.listing-hero-img { height: 340px; background: var(--surface-2); border-radius: var(--r-xl); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 96px; margin-bottom: 24px; }
.listing-title-big { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
.listing-meta-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
.listing-meta-item { font-size: 13px; color: var(--dim); display: flex; align-items: center; gap: 5px; }
.listing-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 24px; }
.amenities-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.amenity-chip { background: var(--surface-3); border: 1px solid var(--border-2); border-radius: var(--r-sm); padding: 7px 12px; font-size: 13px; display: flex; align-items: center; gap: 6px; }

/* Booking form widget */
.booking-widget { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--r-xl); padding: 22px; position: sticky; top: 80px; }
.booking-widget-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.price-big { font-size: 26px; font-weight: 800; margin-bottom: 18px; }
.price-big span { font-size: 14px; color: var(--muted); font-weight: 400; }

/* ── FEATURES/AUTH ───────────────────────────────────── */
.auth-page { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
.auth-box { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--r-2xl); padding: 36px; width: 100%; max-width: 420px; }
.auth-logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 24px; }
.auth-logo span { color: var(--primary-2); }
.auth-tabs { display: flex; background: var(--surface-3); border-radius: var(--r-sm); padding: 3px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.auth-tab.active { background: var(--surface-2); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

/* ── PAGES/PROFILE ───────────────────────────────────── */
.profile-page { padding: 36px 0 80px; }
.profile-grid { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }
.profile-sidebar { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 24px; position: sticky; top: 80px; }
.profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(99,102,241,0.15); border: 2px solid rgba(99,102,241,0.35); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: var(--primary-2); margin-bottom: 14px; }
.profile-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.profile-email { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.profile-role { display: inline-block; font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 100px; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); color: var(--primary-2); margin-bottom: 20px; }
.profile-nav { display: flex; flex-direction: column; gap: 3px; }
.profile-nav-item { padding: 9px 12px; border-radius: var(--r-sm); font-size: 14px; cursor: pointer; border: none; background: none; color: var(--muted); text-align: left; transition: all 0.15s; }
.profile-nav-item:hover { color: var(--ink); background: var(--surface-3); }
.profile-nav-item.active { color: var(--ink); background: var(--surface-3); }

/* Booking list item */
.booking-item { background: var(--surface-3); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px; margin-bottom: 12px; transition: border-color 0.2s; }
.booking-item:hover { border-color: rgba(99,102,241,0.25); }
.booking-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.booking-item-name { font-size: 15px; font-weight: 700; }
.booking-item-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.booking-item-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
.booking-total { font-size: 17px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Notifications */
.notif-item { display: flex; gap: 12px; padding: 14px; border-radius: var(--r-md); border: 1px solid var(--border); margin-bottom: 8px; transition: background 0.15s; cursor: pointer; }
.notif-item:hover { background: var(--surface-3); }
.notif-item.unread { border-color: rgba(99,102,241,0.2); background: rgba(99,102,241,0.04); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 6px; }
.notif-dot.read { background: transparent; border: 1px solid var(--muted); }
.notif-msg { font-size: 14px; line-height: 1.5; }
.notif-time { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Reviews */
.review-item { border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 10px; }
.review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.review-stars { color: var(--warning); font-size: 14px; letter-spacing: 1px; }
.review-author { font-size: 12px; color: var(--muted); }
.review-text { font-size: 14px; color: var(--dim); line-height: 1.6; }

/* ── PAGES/ADMIN ─────────────────────────────────────── */
.admin-page { padding: 36px 0 80px; }
.admin-header { margin-bottom: 28px; }
.admin-table-wrap { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; }
.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th { padding: 12px 16px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border); background: var(--surface-3); }
.admin-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: rgba(99,102,241,0.03); }

/* ── UTILITY ─────────────────────────────────────────── */
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.section-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
.empty-state { text-align: center; padding: 64px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.35; }
.empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--muted); }
.loading-center { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 64px; color: var(--muted); font-size: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.price-calc { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--r-sm); padding: 14px 16px; margin: 16px 0; }
.price-calc-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--dim); }
.price-calc-total { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.success-box { text-align: center; padding: 32px 20px; }
.success-circle { width: 68px; height: 68px; border-radius: 50%; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
.tab-row { display: flex; background: var(--surface-3); border-radius: var(--r-sm); padding: 3px; margin-bottom: 24px; gap: 2px; }
.tab-btn { flex: 1; padding: 9px; font-size: 13px; font-weight: 600; border-radius: 6px; border: none; background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; }

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ════════════════════════════════════════════════════════════
//  shared/config/routes.js
// ════════════════════════════════════════════════════════════
const ROUTES = { HOME: '/', LISTING: '/listing', PROFILE: '/profile', AUTH: '/auth', ADMIN: '/admin' };

// ════════════════════════════════════════════════════════════
//  shared/api/axiosInstance.js — HTTP клиент с JWT-интерцептором
// ════════════════════════════════════════════════════════════
const API_BASE = 'http://localhost:3001/api';

const httpClient = {
  _token: null,
  setToken(t) { this._token = t; },
  clearToken() { this._token = null; },

  async request(method, path, body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
    try {
      const res = await fetch(API_BASE + path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null,
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Ошибка запроса');
      return data;
    } catch (e) {
      throw e;
    }
  },

  get:    (path)       => httpClient.request('GET',   path),
  post:   (path, body) => httpClient.request('POST',  path, body),
  patch:  (path, body) => httpClient.request('PATCH', path, body),
  delete: (path)       => httpClient.request('DELETE', path),
};

// ════════════════════════════════════════════════════════════
//  shared/lib/utils.js
// ════════════════════════════════════════════════════════════
const formatPrice = (p) => new Intl.NumberFormat('ru-RU').format(p) + ' ₽';
const formatDate  = (d) => new Date(d).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
const calcNights  = (from, to) => Math.max(0, Math.ceil((new Date(to) - new Date(from)) / 86400000));
const getInitials = (name) => name?.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase() || '?';
const cn = (...classes) => classes.filter(Boolean).join(' ');

// ════════════════════════════════════════════════════════════
//  app/store — Zustand-style stores (useState + Context)
// ════════════════════════════════════════════════════════════
const StoreContext = createContext(null);

function StoreProvider({ children }) {
  // authStore
  const [auth, setAuth] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('auth') || 'null');
      if (saved?.accessToken) httpClient.setToken(saved.accessToken);
      return saved || { user: null, accessToken: null, isAuthenticated: false };
    } catch { return { user: null, accessToken: null, isAuthenticated: false }; }
  });

  // listingStore
  const [listingStore, setListingStore] = useState({
    listings: [], totalCount: 0,
    filters: { categoryId: '', city: '', search: '' },
    isLoading: false,
  });

  // bookingStore
  const [bookingStore, setBookingStore] = useState({ bookings: [] });

  // notificationStore
  const [notifStore, setNotifStore] = useState({ notifications: [], unreadCount: 0 });

  // authStore actions
  const authActions = {
    login(user, accessToken) {
      httpClient.setToken(accessToken);
      const newAuth = { user, accessToken, isAuthenticated: true };
      setAuth(newAuth);
      localStorage.setItem('auth', JSON.stringify(newAuth));
    },
    logout() {
      httpClient.clearToken();
      setAuth({ user: null, accessToken: null, isAuthenticated: false });
      localStorage.removeItem('auth');
      listingActions.resetFilters();
      setBookingStore({ bookings: [] });
      setNotifStore({ notifications: [], unreadCount: 0 });
    },
    setUser(user) { setAuth(prev => ({ ...prev, user })); },
  };

  // listingStore actions
  const listingActions = {
    setListings(data, total) { setListingStore(prev => ({ ...prev, listings: data, totalCount: total, isLoading: false })); },
    setLoading(v)   { setListingStore(prev => ({ ...prev, isLoading: v })); },
    setFilter(key, value) { setListingStore(prev => ({ ...prev, filters: { ...prev.filters, [key]: value } })); },
    resetFilters()  { setListingStore(prev => ({ ...prev, filters: { categoryId: '', city: '', search: '' } })); },
  };

  // bookingStore actions
  const bookingActions = {
    setBookings(bookings)         { setBookingStore({ bookings }); },
    addBooking(booking)           { setBookingStore(prev => ({ bookings: [booking, ...prev.bookings] })); },
    updateBooking(id, data)       { setBookingStore(prev => ({ bookings: prev.bookings.map(b => b.id === id ? { ...b, ...data } : b) })); },
  };

  // notificationStore actions
  const notifActions = {
    setNotifications(data) {
      setNotifStore({ notifications: data, unreadCount: data.filter(n => !n.isRead).length });
    },
    markAsRead(id) {
      setNotifStore(prev => {
        // .map() из лекции — трансформируем массив уведомлений
        const notifications = prev.notifications.map(n => n.id === id ? { ...n, isRead: true } : n);
        return { notifications, unreadCount: notifications.filter(n => !n.isRead).length };
      });
    },
    markAllAsRead() {
      setNotifStore(prev => ({
        notifications: prev.notifications.map(n => ({ ...n, isRead: true })),
        unreadCount: 0,
      }));
    },
  };

  return (
    <StoreContext.Provider value={{
      auth, authActions,
      listingStore, listingActions,
      bookingStore, bookingActions,
      notifStore, notifActions,
    }}>
      {children}
    </StoreContext.Provider>
  );
}
const useStore = () => useContext(StoreContext);

// ════════════════════════════════════════════════════════════
//  shared/ui — базовые компоненты UI-кита
// ════════════════════════════════════════════════════════════

// Button с isLoading и variants
function Button({ variant='primary', size='md', isLoading, disabled, children, className, onClick, type='button', fullWidth }) {
  return (
    <button
      type={type}
      className={cn(`btn btn-${size} btn-${variant}`, fullWidth && 'btn-full', className)}
      disabled={disabled || isLoading}
      onClick={onClick}
    >
      {isLoading && <span className={`spinner spinner-sm`} />}
      {children}
    </button>
  );
}

// Input с label и error
function Input({ label, error, className, ...props }) {
  return (
    <div className="field-wrap">
      {label && <label className="field-label">{label}</label>}
      <input className={cn('field-input', error && 'error', className)} {...props} />
      {error && <span className="field-error">{error}</span>}
    </div>
  );
}

// Badge по статусу
function Badge({ status }) {
  const labels = { CONFIRMED:'Подтверждено', PENDING:'Ожидает', CANCELLED:'Отменено', COMPLETED:'Завершено' };
  return <span className={cn('badge', `badge-${status}`)}>{labels[status] || status}</span>;
}

// Spinner
function Spinner({ size='md' }) {
  return <span className={cn('spinner', `spinner-${size}`)} />;
}

// Modal с createPortal
function Modal({ isOpen, onClose, title, children }) {
  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [isOpen, onClose]);

  if (!isOpen) return null;
  return ReactDOM.createPortal(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>,
    document.body
  );
}

// Toast
function Toast({ message, type='success', onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  return (
    <div className={cn('toast', `toast-${type}`)}>
      {type === 'success' ? '✓' : '✕'} {message}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  widgets/header — Header / навигация
// ════════════════════════════════════════════════════════════
function Header({ page, setPage }) {
  const { auth, authActions, notifStore } = useStore();
  return (
    <nav className="nav">
      <div className="container">
        <div className="nav-inner">
          <div className="nav-logo" onClick={() => setPage('home')}>
            Book<span>Space</span>
          </div>

          <div className="nav-links">
            <button className={cn('nav-link', page==='home' && 'active')} onClick={() => setPage('home')}>
              Объекты
            </button>
            {auth.isAuthenticated && (
              <button className={cn('nav-link', page==='profile' && 'active')} onClick={() => setPage('profile')}>
                Профиль
                {notifStore.unreadCount > 0 && <span className="nav-badge">{notifStore.unreadCount}</span>}
              </button>
            )}
            {auth.isAuthenticated && auth.user?.role === 'ADMIN' && (
              <button className={cn('nav-link', page==='admin' && 'active')} onClick={() => setPage('admin')}>
                Админ
              </button>
            )}
          </div>

          {auth.isAuthenticated ? (
            <div className="nav-user" style={{ marginLeft: 12 }}>
              <div className="nav-avatar">{getInitials(auth.user?.name)}</div>
              <span style={{ display: 'none' }}>{auth.user?.name}</span>
              <Button variant="ghost" size="sm" onClick={authActions.logout}>Выйти</Button>
            </div>
          ) : (
            <Button variant="primary" size="sm" onClick={() => setPage('auth')} style={{ marginLeft: 12 }}>
              Войти
            </Button>
          )}
        </div>
      </div>
    </nav>
  );
}

// ════════════════════════════════════════════════════════════
//  entities/listing/ui — ListingCard компонент
// ════════════════════════════════════════════════════════════
const CATEGORY_EMOJI = { apartments:'🏠', cottages:'🏡', hotels:'🏨', villas:'🌴' };
const CATEGORY_BG = { apartments:'#1a1020', cottages:'#0e1810', hotels:'#0e1820', villas:'#1a180e' };

function ListingCard({ listing, onClick }) {
  const categoryEmoji = listing.category ? CATEGORY_EMOJI[listing.category.slug] || '🏠' : '🏠';
  const categoryBg    = listing.category ? CATEGORY_BG[listing.category.slug]    || '#141020' : '#141020';
  return (
    <div className="card listing-card" onClick={() => onClick(listing)}>
      <div className="card-img" style={{ background: categoryBg }}>
        <div className="card-emoji">{categoryEmoji}</div>
        <div className="card-city-tag">📍 {listing.city}</div>
      </div>
      <div className="card-body">
        <div className="card-title">{listing.title}</div>
        <div className="card-loc">{listing.category?.name || 'Недвижимость'}</div>
        <div className="card-amenities">
          {/* .slice() + .map() из лекции — рендерим только первые 3 удобства */}
          {listing.amenities.slice(0,3).map(a => (
            <span key={a.id} className="amenity-pill">{a.icon} {a.name}</span>
          ))}
          {listing.amenities.length > 3 && (
            <span className="amenity-pill">+{listing.amenities.length-3}</span>
          )}
        </div>
        <div className="card-footer">
          <div>
            <span className="card-price">{formatPrice(listing.price)}</span>
            <span className="card-price-unit"> / ночь</span>
          </div>
          <div className="card-rating">★ {listing.rating} <span style={{color:'var(--muted)',fontWeight:400}}>({listing.reviewsCount})</span></div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  features/search-filter — SearchFilters компонент
// ════════════════════════════════════════════════════════════
function SearchFilters({ categories, onSearch }) {
  const { listingStore, listingActions } = useStore();
  const { filters } = listingStore;
  const [searchVal, setSearchVal] = useState(filters.search);

  return (
    <div>
      <div className="search-wrap">
        <div className="search-bar">
          <input
            className="search-input"
            placeholder="Поиск по названию или городу..."
            value={searchVal}
            onChange={e => setSearchVal(e.target.value)}
            onKeyDown={e => { if (e.key==='Enter') { listingActions.setFilter('search', searchVal); onSearch(); } }}
          />
          <Button variant="primary" size="sm" onClick={() => { listingActions.setFilter('search', searchVal); onSearch(); }}>
            Найти
          </Button>
        </div>
      </div>

      <div className="filters">
        {/* .map() из лекции — рендерим массив категорий в кнопки */}
        <button
          className={cn('filter-btn', !filters.categoryId && 'active')}
          onClick={() => { listingActions.setFilter('categoryId',''); onSearch(); }}
        >
          Все категории
        </button>
        {categories.map(cat => (
          <button
            key={cat.id}
            className={cn('filter-btn', filters.categoryId===cat.id && 'active')}
            onClick={() => { listingActions.setFilter('categoryId', cat.id); onSearch(); }}
          >
            {cat.icon} {cat.name}
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  widgets/listing-list — ListingList компонент
// ════════════════════════════════════════════════════════════
function ListingList({ onSelectListing }) {
  const { listingStore } = useStore();
  const { listings, isLoading } = listingStore;

  if (isLoading) {
    return (
      <div className="loading-center">
        <Spinner size="lg" />
        <span>Загружаем объекты...</span>
      </div>
    );
  }

  if (!listings.length) {
    return (
      <div className="empty-state">
        <div className="empty-icon">🔍</div>
        <div className="empty-title">Ничего не найдено</div>
        <div className="empty-sub">Попробуйте изменить фильтры</div>
      </div>
    );
  }

  return (
    // .map() из лекции — рендерим массив листингов в карточки
    <div className="listings-grid">
      {listings.map(listing => (
        <ListingCard key={listing.id} listing={listing} onClick={onSelectListing} />
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  pages/home — HomePage
// ════════════════════════════════════════════════════════════
function HomePage({ onSelectListing, setPage }) {
  const { listingStore, listingActions } = useStore();
  const [categories, setCategories] = useState([]);
  const [toast, setToast] = useState(null);

  const loadListings = useCallback(async () => {
    listingActions.setLoading(true);
    try {
      const params = new URLSearchParams();
      const { filters } = listingStore;
      if (filters.categoryId) params.append('categoryId', filters.categoryId);
      if (filters.city)       params.append('city', filters.city);
      if (filters.search)     params.append('search', filters.search);
      const res = await httpClient.get('/listings' + (params.toString() ? '?'+params : ''));
      listingActions.setListings(res.data, res.total || res.data.length);
    } catch (e) {
      setToast({ message: e.message, type: 'error' });
      listingActions.setLoading(false);
    }
  }, [listingStore.filters]);

  useEffect(() => {
    httpClient.get('/categories').then(r => setCategories(r.data)).catch(() => {});
  }, []);

  useEffect(() => { loadListings(); }, [listingStore.filters]);

  const { listings, totalCount } = listingStore;
  // .filter() из лекции — подсчёт уникальных городов
  const cities = [...new Set(listings.map(l => l.city))];

  return (
    <main>
      <section className="hero">
        <div className="container">
          <div className="hero-kicker">Онлайн-бронирование жилья</div>
          <h1 className="hero-h1">
            Твоё идеальное<br/>
            <span className="accent">место ждёт тебя</span>
          </h1>
          <p className="hero-sub">Апартаменты, коттеджи, виллы и отели по всей России. Бронируй в один клик.</p>

          <SearchFilters categories={categories} onSearch={loadListings} />

          <div className="stats-row">
            <div><div className="stat-num">{listings.length}</div><div className="stat-label">объектов</div></div>
            <div><div className="stat-num">{cities.length}</div><div className="stat-label">городов</div></div>
            <div><div className="stat-num">24/7</div><div className="stat-label">поддержка</div></div>
          </div>
        </div>
      </section>

      <div className="container">
        <div className="section-head">
          <div className="section-title">
            {listingStore.filters.categoryId ? categories.find(c=>c.id===listingStore.filters.categoryId)?.name || 'Объекты' : 'Все объекты'}
          </div>
          <div className="section-count">
            {listingStore.isLoading ? '...' : `${totalCount} шт`}
          </div>
        </div>
        <ListingList onSelectListing={onSelectListing} />
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
    </main>
  );
}

// ════════════════════════════════════════════════════════════
//  widgets/booking-form — BookingForm
// ════════════════════════════════════════════════════════════
function BookingForm({ listing, onSuccess, setPage }) {
  const { auth, bookingActions } = useStore();
  const [form, setForm] = useState({ dateFrom: '', dateTo: '' });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [booked, setBooked] = useState(null);

  const today = new Date().toISOString().split('T')[0];
  const nights = form.dateFrom && form.dateTo ? calcNights(form.dateFrom, form.dateTo) : 0;
  const total  = nights * listing.price;

  const validate = () => {
    const e = {};
    if (!form.dateFrom) e.dateFrom = 'Выберите дату заезда';
    if (!form.dateTo)   e.dateTo   = 'Выберите дату выезда';
    if (form.dateFrom && form.dateTo && calcNights(form.dateFrom, form.dateTo) <= 0)
      e.dateTo = 'Дата выезда должна быть позже заезда';
    setErrors(e);
    return !Object.keys(e).length;
  };

  const handleSubmit = async () => {
    if (!auth.isAuthenticated) { setPage('auth'); return; }
    if (!validate()) return;
    setLoading(true);
    try {
      const res = await httpClient.post('/bookings', { listingId: listing.id, ...form });
      bookingActions.addBooking(res.data);
      setBooked(res.data);
      onSuccess?.();
    } catch (e) {
      setErrors({ submit: e.message });
    } finally {
      setLoading(false);
    }
  };

  if (booked) {
    return (
      <div className="success-box">
        <div className="success-circle">🎉</div>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Бронь подтверждена!</div>
        <div style={{ fontSize: 14, color: 'var(--muted)', marginBottom: 18 }}>
          {booked.dateFrom} — {booked.dateTo} · {formatPrice(booked.totalPrice)}
        </div>
        <Button variant="ghost" size="sm" onClick={() => setPage('profile')}>Мои бронирования</Button>
      </div>
    );
  }

  return (
    <div>
      <div className="price-big">{formatPrice(listing.price)} <span>/ ночь</span></div>

      <div className="form-row" style={{ marginBottom: 14 }}>
        <Input label="Заезд" type="date" value={form.dateFrom} min={today}
          error={errors.dateFrom}
          onChange={e => setForm(f => ({ ...f, dateFrom: e.target.value }))} />
        <Input label="Выезд" type="date" value={form.dateTo} min={form.dateFrom || today}
          error={errors.dateTo}
          onChange={e => setForm(f => ({ ...f, dateTo: e.target.value }))} />
      </div>

      {nights > 0 && (
        <div className="price-calc">
          <div className="price-calc-row" style={{ marginBottom: 6 }}>
            <span>{formatPrice(listing.price)} × {nights} ночей</span>
            <span>{formatPrice(total)}</span>
          </div>
          <div style={{ borderTop: '1px solid var(--border)', paddingTop: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>Итого</span>
            <span className="price-calc-total">{formatPrice(total)}</span>
          </div>
        </div>
      )}

      {errors.submit && (
        <div style={{ background: 'rgba(248,113,113,0.1)', border: '1px solid rgba(248,113,113,0.3)', borderRadius: 8, padding: '10px 14px', fontSize: 13, color: 'var(--danger)', marginBottom: 14 }}>
          ⚠ {errors.submit}
        </div>
      )}

      <Button variant="primary" size="md" isLoading={loading} fullWidth onClick={handleSubmit}>
        {auth.isAuthenticated ? (nights > 0 ? `Забронировать за ${formatPrice(total)}` : 'Выберите даты') : 'Войти и забронировать'}
      </Button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  pages/listing — ListingPage
// ════════════════════════════════════════════════════════════
function ListingPage({ listingId, setPage }) {
  const [listing, setListing] = useState(null);
  const [reviews, setReviews] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newReview, setNewReview] = useState({ rating: 5, comment: '' });
  const [reviewLoading, setReviewLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const { auth } = useStore();

  useEffect(() => {
    setLoading(true);
    Promise.all([
      httpClient.get('/listings/' + listingId),
      httpClient.get('/listings/' + listingId + '/reviews'),
    ])
    .then(([l, r]) => { setListing(l.data); setReviews(r.data); })
    .catch(() => setToast({ message: 'Не удалось загрузить объект', type: 'error' }))
    .finally(() => setLoading(false));
  }, [listingId]);

  const submitReview = async () => {
    if (!newReview.comment.trim()) return;
    setReviewLoading(true);
    try {
      const res = await httpClient.post('/listings/' + listingId + '/reviews', newReview);
      setReviews(prev => [res.data, ...prev]);
      setNewReview({ rating: 5, comment: '' });
      setToast({ message: 'Отзыв добавлен!', type: 'success' });
    } catch (e) {
      setToast({ message: e.message, type: 'error' });
    } finally {
      setReviewLoading(false);
    }
  };

  if (loading) return <div className="loading-center" style={{ minHeight: '50vh' }}><Spinner size="lg" /></div>;
  if (!listing) return <div className="empty-state"><div className="empty-title">Объект не найден</div></div>;

  const categoryEmoji = listing.category ? CATEGORY_EMOJI[listing.category.slug] || '🏠' : '🏠';
  const categoryBg = listing.category ? CATEGORY_BG[listing.category.slug] || '#141020' : '#141020';

  return (
    <div className="listing-page">
      <div className="container">
        <button className="btn btn-sm btn-ghost" onClick={() => setPage('home')} style={{ marginBottom: 20 }}>
          ← Назад
        </button>

        <div className="listing-detail-grid">
          {/* Левая колонка */}
          <div>
            <div className="listing-hero-img" style={{ background: categoryBg }}>{categoryEmoji}</div>

            <div className="listing-title-big">{listing.title}</div>
            <div className="listing-meta-row">
              <div className="listing-meta-item">📍 {listing.city}</div>
              <div className="listing-meta-item">⭐ {listing.rating} ({listing.reviewsCount} отзывов)</div>
              <div className="listing-meta-item">🏷️ {listing.category?.name}</div>
            </div>

            <p className="listing-desc">{listing.description}</p>

            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 12 }}>Удобства</div>
            <div className="amenities-grid">
              {/* .map() из лекции — рендерим удобства */}
              {listing.amenities.map(a => (
                <div key={a.id} className="amenity-chip">{a.icon} <span>{a.name}</span></div>
              ))}
            </div>

            <div className="divider" />

            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 16 }}>
              Отзывы {reviews.length > 0 && `(${reviews.length})`}
            </div>

            {/* .map() из лекции — рендерим список отзывов */}
            {reviews.map(r => (
              <div key={r.id} className="review-item">
                <div className="review-header">
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{r.user?.name || 'Гость'}</div>
                    <div className="review-stars">{'★'.repeat(r.rating)}{'☆'.repeat(5-r.rating)}</div>
                  </div>
                  <div className="review-author">{formatDate(r.createdAt)}</div>
                </div>
                <div className="review-text">{r.comment}</div>
              </div>
            ))}

            {reviews.length === 0 && (
              <div style={{ color: 'var(--muted)', fontSize: 14, marginBottom: 20 }}>Отзывов пока нет. Будьте первым!</div>
            )}

            {auth.isAuthenticated && (
              <div style={{ background: 'var(--surface-3)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', padding: 18, marginTop: 16 }}>
                <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>Оставить отзыв</div>
                <div style={{ marginBottom: 12, display: 'flex', gap: 6 }}>
                  {[1,2,3,4,5].map(s => (
                    <button key={s} style={{ fontSize: 22, background: 'none', border: 'none', cursor: 'pointer', opacity: s <= newReview.rating ? 1 : 0.3 }}
                      onClick={() => setNewReview(r => ({ ...r, rating: s }))}>★</button>
                  ))}
                </div>
                <Input placeholder="Ваш комментарий..." value={newReview.comment}
                  onChange={e => setNewReview(r => ({ ...r, comment: e.target.value }))} />
                <Button variant="ghost" size="sm" style={{ marginTop: 10 }} isLoading={reviewLoading}
                  onClick={submitReview} disabled={!newReview.comment.trim()}>
                  Отправить
                </Button>
              </div>
            )}
          </div>

          {/* Правая колонка — виджет бронирования */}
          <div>
            <div className="booking-widget">
              <div className="booking-widget-title">Забронировать</div>
              <BookingForm listing={listing} setPage={setPage}
                onSuccess={() => setToast({ message: 'Бронь подтверждена!', type: 'success' })} />
            </div>
          </div>
        </div>
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  features/auth — LoginForm + RegisterForm
// ════════════════════════════════════════════════════════════
function AuthPage({ setPage }) {
  const [tab, setTab] = useState('login');
  const { authActions } = useStore();
  const [form, setForm] = useState({ email: '', password: '', name: '' });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.email)    e.email    = 'Укажите email';
    if (!form.password) e.password = 'Укажите пароль';
    if (tab==='register' && !form.name) e.name = 'Укажите имя';
    setErrors(e);
    return !Object.keys(e).length;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    setLoading(true);
    try {
      const endpoint = tab === 'login' ? '/auth/login' : '/auth/register';
      const body = tab === 'login' ? { email: form.email, password: form.password } : form;
      const res = await httpClient.post(endpoint, body);
      authActions.login(res.data.user, res.data.accessToken);
      setPage('home');
    } catch (e) {
      setErrors({ submit: e.message });
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="auth-page">
      <div className="auth-box">
        <div className="auth-logo">Book<span>Space</span></div>

        <div className="auth-tabs">
          <button className={cn('auth-tab', tab==='login' && 'active')} onClick={() => setTab('login')}>Войти</button>
          <button className={cn('auth-tab', tab==='register' && 'active')} onClick={() => setTab('register')}>Регистрация</button>
        </div>

        {tab === 'register' && (
          <div style={{ marginBottom: 14 }}>
            <Input label="Имя" placeholder="Ваше имя" value={form.name} error={errors.name}
              onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
          </div>
        )}
        <div style={{ marginBottom: 14 }}>
          <Input label="Email" type="email" placeholder="email@example.com" value={form.email} error={errors.email}
            onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
        </div>
        <div style={{ marginBottom: 20 }}>
          <Input label="Пароль" type="password" placeholder="••••••••" value={form.password} error={errors.password}
            onChange={e => setForm(f => ({ ...f, password: e.target.value }))}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()} />
        </div>

        {errors.submit && (
          <div style={{ background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.3)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--danger)',marginBottom:14 }}>
            ⚠ {errors.submit}
          </div>
        )}

        <Button variant="primary" size="md" fullWidth isLoading={loading} onClick={handleSubmit}>
          {tab === 'login' ? 'Войти' : 'Зарегистрироваться'}
        </Button>

        <div style={{ marginTop: 18, fontSize: 12, color: 'var(--muted)', textAlign: 'center' }}>
          <div style={{ marginBottom: 6, fontWeight: 600 }}>Тестовые аккаунты:</div>
          <div>user@bookspace.ru / user123</div>
          <div>owner@bookspace.ru / owner123</div>
          <div>admin@bookspace.ru / admin123</div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  pages/profile — ProfilePage
// ════════════════════════════════════════════════════════════
function ProfilePage({ setPage }) {
  const { auth, bookingStore, bookingActions, notifStore, notifActions } = useStore();
  const [activeTab, setActiveTab] = useState('bookings');
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    if (!auth.isAuthenticated) { setPage('auth'); return; }
    setLoading(true);
    Promise.all([
      httpClient.get('/bookings'),
      httpClient.get('/notifications'),
    ])
    .then(([b, n]) => {
      bookingActions.setBookings(b.data);
      notifActions.setNotifications(n.data);
    })
    .catch(() => {})
    .finally(() => setLoading(false));
  }, [auth.isAuthenticated]);

  const cancelBooking = async (id) => {
    try {
      await httpClient.patch('/bookings/' + id + '/cancel');
      bookingActions.updateBooking(id, { status: 'CANCELLED' });
      setToast({ message: 'Бронь отменена', type: 'success' });
    } catch (e) {
      setToast({ message: e.message, type: 'error' });
    }
  };

  const markNotifRead = async (id) => {
    notifActions.markAsRead(id);
    try { await httpClient.patch('/notifications/' + id + '/read'); } catch {}
  };

  if (!auth.isAuthenticated) return null;
  const { user } = auth;
  const { bookings } = bookingStore;
  const { notifications } = notifStore;

  // .filter() из лекции — разделяем активные и отменённые брони
  const activeBookings    = bookings.filter(b => b.status !== 'CANCELLED');
  const cancelledBookings = bookings.filter(b => b.status === 'CANCELLED');

  return (
    <div className="profile-page">
      <div className="container">
        <div className="profile-grid">
          {/* Сайдбар */}
          <div className="profile-sidebar">
            <div className="profile-avatar">{getInitials(user.name)}</div>
            <div className="profile-name">{user.name}</div>
            <div className="profile-email">{user.email}</div>
            <div className="profile-role">{user.role}</div>
            <div className="profile-nav">
              <button className={cn('profile-nav-item', activeTab==='bookings' && 'active')} onClick={() => setActiveTab('bookings')}>
                📋 Мои бронирования
                {activeBookings.length > 0 && <span className="nav-badge" style={{ marginLeft: 6 }}>{activeBookings.length}</span>}
              </button>
              <button className={cn('profile-nav-item', activeTab==='notifications' && 'active')} onClick={() => setActiveTab('notifications')}>
                🔔 Уведомления
                {notifStore.unreadCount > 0 && <span className="nav-badge" style={{ marginLeft: 6 }}>{notifStore.unreadCount}</span>}
              </button>
              <button className="profile-nav-item" onClick={() => { auth.authActions?.logout(); setPage('home'); }}>
                🚪 Выйти
              </button>
            </div>
          </div>

          {/* Основной контент */}
          <div>
            {loading && <div className="loading-center"><Spinner size="lg" /></div>}

            {!loading && activeTab === 'bookings' && (
              <div>
                <div className="section-head">
                  <div className="section-title">Мои бронирования</div>
                  <div className="section-count">{bookings.length} всего</div>
                </div>

                {bookings.length === 0 && (
                  <div className="empty-state">
                    <div className="empty-icon">📋</div>
                    <div className="empty-title">Бронирований нет</div>
                    <div className="empty-sub" style={{ marginBottom: 20 }}>Найдите объект и забронируйте</div>
                    <Button variant="primary" size="sm" onClick={() => setPage('home')}>Смотреть объекты</Button>
                  </div>
                )}

                {/* .map() из лекции — рендерим брони */}
                {activeBookings.map(b => (
                  <div key={b.id} className="booking-item">
                    <div className="booking-item-top">
                      <div>
                        <div className="booking-item-name">{b.listing?.title || b.listingId}</div>
                        <div className="booking-item-meta">📍 {b.listing?.city} · {b.dateFrom} — {b.dateTo}</div>
                      </div>
                      <Badge status={b.status} />
                    </div>
                    <div className="booking-item-footer">
                      <div className="booking-total">{formatPrice(b.totalPrice)}</div>
                      {b.status === 'CONFIRMED' && (
                        <Button variant="danger" size="sm" onClick={() => cancelBooking(b.id)}>Отменить</Button>
                      )}
                    </div>
                  </div>
                ))}

                {cancelledBookings.length > 0 && (
                  <>
                    <div style={{ color: 'var(--muted)', fontSize: 13, fontWeight: 600, margin: '20px 0 12px' }}>Отменённые</div>
                    {cancelledBookings.map(b => (
                      <div key={b.id} className="booking-item" style={{ opacity: 0.5 }}>
                        <div className="booking-item-top">
                          <div>
                            <div className="booking-item-name">{b.listing?.title || b.listingId}</div>
                            <div className="booking-item-meta">{b.dateFrom} — {b.dateTo}</div>
                          </div>
                          <Badge status={b.status} />
                        </div>
                        <div className="booking-item-footer">
                          <div className="booking-total">{formatPrice(b.totalPrice)}</div>
                        </div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}

            {!loading && activeTab === 'notifications' && (
              <div>
                <div className="section-head">
                  <div className="section-title">Уведомления</div>
                  {notifStore.unreadCount > 0 && (
                    <Button variant="ghost" size="sm" onClick={() => notifActions.markAllAsRead()}>
                      Прочитать все
                    </Button>
                  )}
                </div>

                {notifications.length === 0 && (
                  <div className="empty-state">
                    <div className="empty-icon">🔔</div>
                    <div className="empty-title">Уведомлений нет</div>
                  </div>
                )}

                {/* .map() из лекции — рендерим уведомления */}
                {notifications.map(n => (
                  <div key={n.id} className={cn('notif-item', !n.isRead && 'unread')} onClick={() => markNotifRead(n.id)}>
                    <div className={cn('notif-dot', n.isRead && 'read')} />
                    <div>
                      <div className="notif-msg">{n.message}</div>
                      <div className="notif-time">{formatDate(n.createdAt)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  pages/admin — AdminPage (ADMIN only)
// ════════════════════════════════════════════════════════════
function AdminPage({ setPage }) {
  const { auth } = useStore();
  const [tab, setTab] = useState('users');
  const [users, setUsers] = useState([]);
  const [allBookings, setAllBookings] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!auth.isAuthenticated || auth.user?.role !== 'ADMIN') { setPage('home'); return; }
    Promise.all([
      httpClient.get('/admin/users'),
      httpClient.get('/admin/bookings'),
    ])
    .then(([u, b]) => { setUsers(u.data); setAllBookings(b.data); })
    .catch(() => {})
    .finally(() => setLoading(false));
  }, []);

  if (!auth.isAuthenticated || auth.user?.role !== 'ADMIN') return null;

  // .filter() из лекции — фильтруем брони по статусу
  const confirmedBookings = allBookings.filter(b => b.status === 'CONFIRMED');
  const totalRevenue = confirmedBookings.reduce((sum, b) => sum + b.totalPrice, 0);

  return (
    <div className="admin-page">
      <div className="container">
        <div className="admin-header">
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--primary-2)', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 8 }}>Панель администратора</div>
          <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5 }}>Управление сайтом</div>
        </div>

        {/* Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 14, marginBottom: 28 }}>
          {[
            { label: 'Пользователей', value: users.length, icon: '👥' },
            { label: 'Бронирований', value: allBookings.length, icon: '📋' },
            { label: 'Активных броней', value: confirmedBookings.length, icon: '✅' },
            { label: 'Выручка', value: formatPrice(totalRevenue), icon: '💰' },
          ].map(s => (
            <div key={s.label} style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 'var(--r-lg)', padding: '16px 18px' }}>
              <div style={{ fontSize: 22, marginBottom: 8 }}>{s.icon}</div>
              <div style={{ fontSize: 20, fontWeight: 800 }}>{s.value}</div>
              <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>

        <div className="tab-row">
          <button className={cn('tab-btn', tab==='users' && 'active')} onClick={() => setTab('users')}>Пользователи ({users.length})</button>
          <button className={cn('tab-btn', tab==='bookings' && 'active')} onClick={() => setTab('bookings')}>Бронирования ({allBookings.length})</button>
        </div>

        {loading && <div className="loading-center"><Spinner size="lg" /></div>}

        {!loading && tab === 'users' && (
          <div className="admin-table-wrap">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Имя</th><th>Email</th><th>Роль</th><th>Зарегистрирован</th>
                </tr>
              </thead>
              <tbody>
                {/* .map() из лекции — рендерим строки таблицы */}
                {users.map(u => (
                  <tr key={u.id}>
                    <td style={{ fontWeight: 600 }}>{u.name}</td>
                    <td style={{ color: 'var(--muted)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>{u.email}</td>
                    <td><span className={cn('role-badge', `role-${u.role}`)}>{u.role}</span></td>
                    <td style={{ color: 'var(--muted)', fontSize: 12 }}>{formatDate(u.createdAt)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {!loading && tab === 'bookings' && (
          <div className="admin-table-wrap">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>ID</th><th>Объект</th><th>Даты</th><th>Статус</th><th>Сумма</th>
                </tr>
              </thead>
              <tbody>
                {allBookings.map(b => (
                  <tr key={b.id}>
                    <td style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted)' }}>#{b.id.slice(0,8)}</td>
                    <td style={{ fontWeight: 600 }}>{b.listingId}</td>
                    <td style={{ fontSize: 12, color: 'var(--muted)' }}>{b.dateFrom} → {b.dateTo}</td>
                    <td><Badge status={b.status} /></td>
                    <td style={{ fontWeight: 700 }}>{formatPrice(b.totalPrice)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  app/router — Router (простая реализация без React Router)
// ════════════════════════════════════════════════════════════
function Router() {
  const [page, setPage] = useState('home');
  const [selectedListingId, setSelectedListingId] = useState(null);

  const handleSelectListing = (listing) => {
    setSelectedListingId(listing.id);
    setPage('listing');
  };

  return (
    <>
      <Header page={page} setPage={setPage} />

      {/* ProtectedRoute логика встроена в каждую страницу */}
      {page === 'home'    && <HomePage onSelectListing={handleSelectListing} setPage={setPage} />}
      {page === 'listing' && <ListingPage listingId={selectedListingId} setPage={setPage} />}
      {page === 'profile' && <ProfilePage setPage={setPage} />}
      {page === 'auth'    && <AuthPage setPage={setPage} />}
      {page === 'admin'   && <AdminPage setPage={setPage} />}
    </>
  );
}

// ════════════════════════════════════════════════════════════
//  app/providers — корневой провайдер (QueryClient + Store)
// ════════════════════════════════════════════════════════════
function App() {
  return (
    <StoreProvider>
      <Router />
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
