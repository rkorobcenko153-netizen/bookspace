<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BookSpace — Онлайн-бронирование жилья</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════
   DESIGN TOKENS — Midnight Indigo palette
   ════════════════════════════════════════════════════════ */
:root {
  --bg:    #07060f;
  --s1:    #0f0d1c;
  --s2:    #171530;
  --s3:    #201e3e;
  --s4:    #2a2850;
  --b1: rgba(255,255,255,.06);
  --b2: rgba(255,255,255,.11);
  --b3: rgba(255,255,255,.18);
  --ink:   #ede8ff;
  --dim:   #7c7a9a;
  --muted: #4a4868;
  --v:     #7c5cfc;    /* primary violet */
  --v2:    #a78bfa;
  --v3:    #c4b5fd;
  --c:     #06b6d4;    /* cyan accent */
  --c2:    #67e8f9;
  --g:     #10b981;    /* emerald */
  --am:    #f59e0b;    /* amber */
  --ro:    #f43f5e;    /* rose */
  --grad:  linear-gradient(135deg,#7c5cfc,#06b6d4);
  --grad2: linear-gradient(135deg,#7c5cfc 0%,#a78bfa 45%,#06b6d4 100%);
  --glow:  rgba(124,92,252,.18);
  --r1:6px; --r2:10px; --r3:14px; --r4:20px; --r5:30px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 55% at 8% 0%,rgba(124,92,252,.10),transparent 55%),
    radial-gradient(ellipse 55% 55% at 92% 100%,rgba(6,182,212,.08),transparent 55%);
}
::-webkit-scrollbar { width:4px }
::-webkit-scrollbar-track { background:var(--bg) }
::-webkit-scrollbar-thumb { background:var(--s3); border-radius:4px }

/* ── LAYOUT ─────────────────────────────────────────────── */
.z { position:relative; z-index:1 }
.wrap { max-width:1200px; margin:0 auto; padding:0 24px }

/* ── NAV ─────────────────────────────────────────────────── */
.nav {
  position:sticky; top:0; z-index:400;
  background:rgba(7,6,15,.88);
  backdrop-filter:blur(22px);
  border-bottom:1px solid var(--b1);
}
.nav-row { display:flex; align-items:center; height:64px; gap:6px }
.logo {
  font-size:20px; font-weight:900; letter-spacing:-0.6px; cursor:pointer;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; flex-shrink:0;
}
.nav-tabs { display:flex; gap:2px; margin-left:auto }
.tab {
  font-size:14px; font-weight:500; padding:8px 14px;
  border-radius:var(--r1); border:none; background:transparent;
  color:var(--dim); cursor:pointer; transition:all .18s; position:relative;
}
.tab:hover { color:var(--ink); background:var(--s1) }
.tab.on { color:var(--ink); background:var(--s2) }
.tab.on::after {
  content:''; position:absolute; bottom:-1px; left:14px; right:14px;
  height:2px; background:var(--grad); border-radius:2px 2px 0 0;
}
/* Cart button */
.cart-btn {
  position:relative; display:flex; align-items:center; gap:8px;
  padding:9px 20px; border-radius:var(--r5);
  border:1px solid var(--b2); background:var(--s2);
  color:var(--ink); font-size:14px; font-weight:600;
  cursor:pointer; transition:all .2s; margin-left:10px; flex-shrink:0;
}
.cart-btn:hover {
  background:rgba(124,92,252,.18);
  border-color:rgba(124,92,252,.4); color:var(--v3);
}
.cbadge {
  position:absolute; top:-7px; right:-7px;
  min-width:20px; height:20px; padding:0 5px;
  background:var(--v); color:#fff;
  font-size:11px; font-weight:700; border-radius:100px;
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--bg);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

/* ── HERO ─────────────────────────────────────────────────── */
.hero { padding:92px 0 60px; text-align:center }
.hero-eye {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:3.5px; text-transform:uppercase;
  color:var(--c2); margin-bottom:20px;
}
.hero-h1 {
  font-size:clamp(40px,8vw,80px); font-weight:900;
  line-height:1.0; letter-spacing:-2.5px; margin-bottom:18px;
}
.hero-h1 .acc {
  background:var(--grad2);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-sub {
  font-size:17px; color:var(--dim); max-width:500px;
  margin:0 auto 38px; line-height:1.7;
}

/* Search bar */
.sbar {
  display:flex; align-items:center;
  background:var(--s1); border:1px solid var(--b2);
  border-radius:100px; padding:6px 6px 6px 22px; gap:10px;
  max-width:680px; margin:0 auto 20px;
  transition:box-shadow .2s, border-color .2s;
}
.sbar:focus-within {
  border-color:rgba(124,92,252,.45);
  box-shadow:0 0 0 3px var(--glow);
}
.sinp {
  flex:1; background:none; border:none; outline:none;
  font-size:15px; color:var(--ink); font-family:'Inter',sans-serif;
}
.sinp::placeholder { color:var(--muted) }
.sbtn {
  padding:10px 24px; border-radius:100px; border:none;
  background:var(--grad); color:#fff; font-weight:700;
  font-size:14px; cursor:pointer;
  transition:filter .2s, transform .2s; white-space:nowrap;
}
.sbtn:hover { filter:brightness(1.1); transform:translateY(-1px) }

/* Filter pills */
.frow { display:flex; flex-wrap:wrap; justify-content:center; gap:7px; margin-bottom:6px }
.fp {
  font-size:12px; font-weight:500; padding:6px 14px;
  border-radius:100px; border:1px solid var(--b2);
  background:var(--s1); color:var(--dim); cursor:pointer;
  transition:all .18s;
}
.fp:hover { color:var(--ink); border-color:rgba(124,92,252,.35) }
.fp.on { background:rgba(124,92,252,.14); border-color:rgba(124,92,252,.5); color:var(--v3) }

/* Hero stats */
.hstats { display:flex; justify-content:center; gap:52px; margin-top:48px; flex-wrap:wrap }
.hs-n {
  font-size:34px; font-weight:800;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.hs-l { font-size:12px; color:var(--muted); margin-top:2px }

/* ── GRID HEAD ───────────────────────────────────────────── */
.gh { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px }
.gh-title { font-size:20px; font-weight:700; letter-spacing:-0.3px }
.gh-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted) }
.pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; padding-bottom:72px }

/* ── PROPERTY CARD ───────────────────────────────────────── */
.pc {
  background:var(--s1); border:1px solid var(--b1);
  border-radius:var(--r4); overflow:hidden; cursor:pointer;
  transition:border-color .22s, transform .22s, box-shadow .22s;
}
.pc:hover {
  border-color:rgba(124,92,252,.35);
  transform:translateY(-5px);
  box-shadow:0 24px 60px rgba(0,0,0,.45);
}
.pc-img {
  height:182px; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.pc-em { font-size:80px; opacity:.09; filter:blur(2px) }
.pc-city {
  position:absolute; top:11px; left:11px;
  font-family:'JetBrains Mono',monospace; font-size:10px;
  background:rgba(0,0,0,.68); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1); border-radius:100px;
  padding:4px 10px; color:var(--ink);
}
.pc-hot {
  position:absolute; top:11px; right:11px;
  font-size:10px; font-weight:700; padding:4px 9px;
  border-radius:100px;
  background:rgba(244,63,94,.15); border:1px solid rgba(244,63,94,.35);
  color:#fda4af;
}
.pc-body { padding:16px }
.pc-name { font-size:15px; font-weight:700; margin-bottom:5px; line-height:1.3; letter-spacing:-0.2px }
.pc-meta { font-size:12px; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:4px }
.pc-pills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px }
.pp { font-size:11px; padding:3px 8px; border-radius:100px; background:var(--s2); border:1px solid var(--b1); color:var(--dim) }
.pc-foot {
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid var(--b1); padding-top:12px;
}
.pc-price { font-size:17px; font-weight:700 }
.pc-psub { font-size:11px; color:var(--muted); font-weight:400 }
.pc-rating { font-size:12px; font-weight:600; color:var(--am); display:flex; align-items:center; gap:3px }
/* Add-to-cart button */
.abtn {
  font-size:12px; font-weight:600; padding:7px 14px;
  border-radius:var(--r1);
  border:1px solid rgba(124,92,252,.35);
  background:rgba(124,92,252,.10); color:var(--v3);
  cursor:pointer; transition:all .18s;
}
.abtn:hover:not(:disabled) { background:rgba(124,92,252,.26) }
.abtn.done { background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.35); color:#6ee7b7; cursor:default }

/* ── MAP PAGE ────────────────────────────────────────────── */
.map-wrap {
  border-radius:var(--r4); overflow:hidden;
  border:1px solid var(--b2); height:480px;
  position:relative; background:var(--s1);
}
.map-frame { width:100%; height:100%; border:none; display:block }
.map-legend {
  position:absolute; bottom:14px; left:14px;
  background:rgba(7,6,15,.9); backdrop-filter:blur(14px);
  border:1px solid var(--b2); border-radius:var(--r3);
  padding:14px; max-width:255px; max-height:310px; overflow-y:auto;
}
.map-legend::-webkit-scrollbar { width:3px }
.mleg-title {
  font-size:10px; font-weight:700; color:var(--dim);
  letter-spacing:1.2px; text-transform:uppercase;
  margin-bottom:10px; font-family:'JetBrains Mono',monospace;
}
.mpin { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--b1) }
.mpin:last-child { border-bottom:none }
.mpd { width:8px; height:8px; border-radius:50%; flex-shrink:0 }
.mpn { font-size:11px; font-weight:600; color:var(--ink); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.mpp { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--v3); flex-shrink:0 }
.coord-table {
  background:var(--s1); border:1px solid var(--b2);
  border-radius:var(--r4); overflow:hidden; margin-top:28px;
}
.coord-table table { width:100%; border-collapse:collapse }
.coord-table th {
  padding:10px 14px; font-size:10px;
  font-family:'JetBrains Mono',monospace; color:var(--muted);
  text-align:left; border-bottom:1px solid var(--b1);
  background:var(--s2); text-transform:uppercase; letter-spacing:1px;
}
.coord-table td { padding:9px 14px; font-size:13px; border-bottom:1px solid var(--b1) }
.coord-table tr:last-child td { border-bottom:none }
.coord-table tr:hover td { background:rgba(124,92,252,.04) }
.type-pill {
  font-size:10px; padding:2px 8px; border-radius:4px;
  background:var(--s2); border:1px solid var(--b2);
  color:var(--dim); font-family:'JetBrains Mono',monospace;
}
.price-grad {
  font-weight:700;
  background:var(--grad);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; white-space:nowrap;
}

/* ── FSD TREE ────────────────────────────────────────────── */
.fsd-shell {
  background:var(--s1); border:1px solid var(--b2);
  border-radius:var(--r4); padding:32px 28px; overflow-x:auto;
}
.import-flow {
  display:flex; align-items:center; flex-wrap:wrap; gap:8px;
  padding:12px 18px; background:var(--s2);
  border-radius:var(--r2); margin-bottom:28px;
  border:1px solid var(--b1); font-size:12px; color:var(--dim);
}
.if-arr { color:var(--v3); font-size:15px }
.src-row { display:flex; align-items:center; gap:8px; margin-bottom:18px; padding-left:4px }
.src-label { font-size:15px; font-weight:700; font-family:'JetBrains Mono',monospace }
.fsd-layer { margin-bottom:20px }
.fsd-layer:last-of-type { margin-bottom:0 }
/* Layer header row */
.lhd {
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-radius:var(--r1);
  cursor:pointer; transition:background .15s;
  user-select:none;
}
.lhd:hover { background:var(--s2) }
.lbar { width:3px; height:22px; border-radius:2px; flex-shrink:0 }
.lname { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700 }
.lnum { font-size:10px; color:var(--muted); letter-spacing:1.2px }
.ldesc { font-size:11px; color:var(--dim) }
.lrule { font-size:10px; color:var(--muted); margin-left:auto; white-space:nowrap }
.larr { font-size:11px; color:var(--muted); transition:transform .22s; flex-shrink:0 }
/* Node rows */
.lnodes { display:flex; margin-top:6px }
.lline { width:22px; display:flex; justify-content:center; flex-shrink:0 }
.llinev { width:1px; background:var(--b2) }
.nl { display:flex; flex-direction:column; gap:5px; flex:1 }
.nd {
  display:flex; align-items:center; gap:9px;
  padding:8px 12px; border-radius:var(--r2);
  border:1px solid transparent; transition:all .15s;
}
.nd:hover { background:var(--s2); border-color:var(--b2) }
.nd-ico { font-size:14px; width:20px; text-align:center; flex-shrink:0 }
.nd-name {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  font-weight:600; color:var(--ink); flex-shrink:0; min-width:92px;
}
.nd-path { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0 }
.nd-badge { font-size:10px; padding:2px 8px; border-radius:100px; font-weight:700; flex-shrink:0 }
.nd-desc { font-size:11px; color:var(--dim); margin-left:auto; text-align:right }
/* Per-layer color theming */
.lc-rose .lbar{background:#f43f5e} .lc-rose .lname{color:#fda4af}
.lc-rose .nd-badge{background:rgba(244,63,94,.12);color:#fda4af;border:1px solid rgba(244,63,94,.28)}
.lc-amber .lbar{background:#f59e0b} .lc-amber .lname{color:#fcd34d}
.lc-amber .nd-badge{background:rgba(245,158,11,.10);color:#fcd34d;border:1px solid rgba(245,158,11,.25)}
.lc-violet .lbar{background:#7c5cfc} .lc-violet .lname{color:var(--v3)}
.lc-violet .nd-badge{background:rgba(124,92,252,.13);color:var(--v3);border:1px solid rgba(124,92,252,.28)}
.lc-cyan .lbar{background:#06b6d4} .lc-cyan .lname{color:var(--c2)}
.lc-cyan .nd-badge{background:rgba(6,182,212,.10);color:var(--c2);border:1px solid rgba(6,182,212,.25)}
.lc-green .lbar{background:#10b981} .lc-green .lname{color:#6ee7b7}
.lc-green .nd-badge{background:rgba(16,185,129,.10);color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}
.lc-slate .lbar{background:#64748b} .lc-slate .lname{color:#cbd5e1}
.lc-slate .nd-badge{background:rgba(100,116,139,.10);color:#cbd5e1;border:1px solid rgba(100,116,139,.22)}
/* Backend mini-cards */
.be-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:8px; margin-top:14px }
.be-card {
  background:var(--s2); border:1px solid var(--b1);
  border-radius:var(--r2); padding:10px 13px;
  display:flex; align-items:center; gap:9px;
}
.be-card-name { font-size:12px; font-weight:600; font-family:'JetBrains Mono',monospace; color:var(--ink) }
.be-card-desc { font-size:11px; color:var(--muted); margin-top:1px }
/* Principle cards */
.pcards { display:grid; grid-template-columns:repeat(auto-fit,minmax(235px,1fr)); gap:12px; margin-top:22px }
.pcard-item {
  background:var(--bg); border:1px solid var(--b2);
  border-radius:var(--r3); padding:18px;
}
.pcard-item-ico { font-size:22px; margin-bottom:10px }
.pcard-item-t { font-size:13px; font-weight:700; margin-bottom:5px }
.pcard-item-d { font-size:12px; color:var(--dim); line-height:1.65 }

/* ── CART PANEL ──────────────────────────────────────────── */
.cart-ov {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
  display:flex; align-items:stretch; justify-content:flex-end;
}
.cart-panel {
  width:460px; max-width:100%; height:100vh;
  background:var(--s1); border-left:1px solid var(--b2);
  display:flex; flex-direction:column;
  animation:cpIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cpIn { from{transform:translateX(56px);opacity:0} to{transform:none;opacity:1} }
.cp-head {
  padding:22px 24px 18px; border-bottom:1px solid var(--b1);
  display:flex; align-items:center; justify-content:space-between;
}
.cp-title { font-size:19px; font-weight:700; letter-spacing:-0.3px }
.cp-count { font-size:13px; color:var(--muted); margin-top:2px }
.cp-x {
  width:34px; height:34px; border-radius:50%;
  background:var(--s2); border:1px solid var(--b2);
  color:var(--dim); cursor:pointer; font-size:20px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.cp-x:hover { color:var(--ink) }
.cp-body { flex:1; overflow-y:auto; padding:16px 24px }
.cp-empty { text-align:center; padding:60px 20px }
.cp-empty-ico { font-size:52px; margin-bottom:16px; opacity:.3 }
/* Cart item */
.ci {
  background:var(--s2); border:1px solid var(--b1);
  border-radius:var(--r3); padding:15px; margin-bottom:10px;
  transition:border-color .18s;
}
.ci:hover { border-color:var(--b2) }
.ci-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px }
.ci-name { font-size:14px; font-weight:700; line-height:1.3 }
.ci-sub { font-size:11px; color:var(--muted); margin-top:2px }
.ci-rm { font-size:22px; color:var(--muted); cursor:pointer; background:none; border:none; line-height:1; padding:0; transition:color .15s; flex-shrink:0 }
.ci-rm:hover { color:var(--ro) }
.ci-dates { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px }
.ci-df { display:flex; flex-direction:column; gap:4px }
.ci-dl { font-size:10px; color:var(--muted); letter-spacing:.8px; text-transform:uppercase; font-weight:600 }
.ci-di {
  background:var(--s3); border:1px solid var(--b2);
  border-radius:var(--r1); padding:8px 10px;
  font-size:13px; color:var(--ink); outline:none;
  transition:border-color .18s; width:100%;
  font-family:'Inter',sans-serif;
}
.ci-di:focus { border-color:rgba(124,92,252,.5); box-shadow:0 0 0 2px var(--glow) }
.ci-foot { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--b1); padding-top:10px }
.ci-nights { font-size:11px; color:var(--dim) }
.ci-total {
  font-size:17px; font-weight:700;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
/* Cart footer */
.cp-foot { padding:18px 24px; border-top:1px solid var(--b1) }
.cp-sum { background:var(--s2); border-radius:var(--r2); padding:16px; margin-bottom:14px }
.csr { display:flex; justify-content:space-between; font-size:13px; color:var(--dim); margin-bottom:7px }
.csr:last-child { margin-bottom:0 }
.cstot { font-size:22px; font-weight:800; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text }
.cobtn {
  width:100%; padding:14px; border-radius:var(--r3);
  border:none; background:var(--grad); color:#fff;
  font-size:15px; font-weight:700; cursor:pointer;
  transition:filter .22s, transform .22s; letter-spacing:0.1px;
}
.cobtn:hover:not(:disabled) { filter:brightness(1.12); transform:translateY(-1px) }
.cobtn:disabled { opacity:.42; cursor:not-allowed; transform:none }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  background:var(--s2); border:1px solid var(--b2);
  border-radius:var(--r3); padding:12px 22px;
  font-size:14px; font-weight:500; z-index:600;
  display:flex; align-items:center; gap:10px;

// app/store — 4 стора через Context (Zustand-style)
// ════════════════════════════════════════════════════════
const Ctx = createContext(null);

function Store({ children }) {
  // cartStore
  const [cart, setCart] = useState([]);

  const cartActions = {
    add(h)    { setCart(p => p.some(i => i.h.id === h.id) ? p : [...p, { h, from: today(), to: tmrw() }]); },
    remove(id){ setCart(p => p.filter(i => i.h.id !== id)); },
    upd(id, f, v) { setCart(p => p.map(i => i.h.id === id ? { ...i, [f]: v } : i)); },
    has(id)   { return cart.some(i => i.h.id === id); },
    // .reduce() из лекции — суммируем стоимость
    total()   { return cart.reduce((s, i) => s + i.h.price * nights(i.from, i.to), 0); },
  };

  // listingStore
  const [search, setSearch] = useState('');
  const [cat,    setCat   ] = useState('Все');
  const [city,   setCity  ] = useState('Все');

  // .filter() из лекции — применяем все фильтры
  const filtered = useMemo(() =>
    HOMES
      .filter(h => cat  === 'Все' || h.type === cat)
      .filter(h => city === 'Все' || h.city === city)
      .filter(h => !search || h.name.toLowerCase().includes(search.toLowerCase())
                           || h.city.toLowerCase().includes(search.toLowerCase())),
    [cat, city, search]
  );

  return (
    <Ctx.Provider value={{ cart, cartActions, filtered, search, setSearch, cat, setCat, city, setCity }}>
      {children}
    </Ctx.Provider>
  );
}
const useStore = () => useContext(Ctx);

// ════════════════════════════════════════════════════════
function Toast({ msg, type = 'ok', onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3100); return () => clearTimeout(t); }, []);
  const icon = { ok: '✓', err: '✕', cart: '🛒' }[type] || '✓';
  return <div className={cn('toast', type)}>{icon} {msg}</div>;
}

// ════════════════════════════════════════════════════════
function MapPage({ onOpen }) {
  const { filtered } = useStore();
  // Центр карты на России
  const mapSrc = 'https://www.openstreetmap.org/export/embed.html?bbox=29.0%2C42.0%2C135.0%2C66.5&layer=mapnik';
  const gmUrl  = `https://www.google.com/maps/search/аренда+жилья+Россия/@58.0,80.0,4z`;

  // .filter() из лекции — города отфильтрованных объектов
  const visibleCities = [...new Set(filtered.map(h => h.city))];

  return (
    <div className="wrap sec z">
      <div className="sec-eye">Объекты на карте</div>
      <div className="sec-h">Расположение объектов</div>
      <p className="sec-sub" style={{ marginBottom: 22 }}>
        Показано {filtered.length} объектов в {visibleCities.length} городах ·{' '}
        <a href={gmUrl} target="_blank" rel="noopener noreferrer"
          style={{ color:'var(--v3)', textDecoration:'none' }}>
          Открыть Google Maps →
        </a>
      </p>

      <div className="map-wrap">
        <iframe
          className="map-frame"
          src={mapSrc}
          title="Карта объектов BookSpace"
          loading="lazy"
          referrerPolicy="no-referrer-when-downgrade"
        />
        {/* Легенда объектов поверх карты */}
        <div className="map-legend">
          <div className="mleg-title">📍 Объекты ({filtered.length})</div>
          {/* .map() из лекции — пины на карте */}
          {filtered.map((h, i) => (
            <div key={h.id} className="mpin">
              <div className="mpd" style={{ background: PIN_COLORS[i % PIN_COLORS.length] }} />
              <div style={{ flex:1, minWidth:0 }}>
                <div className="mpn">{h.name}</div>
                <div style={{ fontSize:10, color:'var(--muted)' }}>{h.city}</div>
              </div>
              <div className="mpp">{fmt(h.price)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Таблица координат */}
      <div className="coord-table">
        <div className="gh" style={{ padding:'14px 18px', borderBottom:'1px solid var(--b1)', marginBottom:0 }}>
          <div className="gh-title">Координаты объектов</div>
          <div className="gh-count">{filtered.length} записей</div>
        </div>
        <table>
          <thead>
            <tr>
              {['Объект', 'Город', 'Тип', 'Широта', 'Долгота', 'Цена / ночь'].map(h => (
                <th key={h}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {/* .map() из лекции — строки таблицы */}
            {filtered.map(h => (
              <tr key={h.id}>
                <td style={{ fontWeight:600 }}>{h.emoji} {h.name}</td>
                <td style={{ color:'var(--dim)' }}>{h.city}</td>
                <td><span className="type-pill">{h.type}</span></td>
                <td style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'var(--muted)' }}>{h.lat}°N</td>
                <td style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'var(--muted)' }}>{h.lng}°E</td>
                <td><span className="price-grad">{fmt(h.price)}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// pages/FSDPage — интерактивное дерево
// ════════════════════════════════════════════════════════
function FSDPage() {
  const [open, setOpen] = useState(null);
  const toggle = id => setOpen(o => o === id ? null : id);

  const LC_COLOR = { rose:'#fda4af', amber:'#fcd34d', violet:'#c4b5fd', cyan:'#67e8f9', green:'#6ee7b7', slate:'#cbd5e1' };
  const getKey = lc => lc.replace('lc-', '');

  return (
    <div className="wrap sec z">
      <div className="sec-eye">Feature-Sliced Design</div>
      <div className="sec-h">Архитектура проекта BookSpace</div>
      <p className="sec-sub" style={{ marginBottom: 26 }}>
        6 слоёв FSD — каждый импортирует только нижележащие.
        Нажми на слой чтобы раскрыть файловую структуру.
      </p>

      <div className="fsd-shell">

        {/* Правило направления импортов */}
        <div className="import-flow">
          <span>📐 Направление импортов:</span>
          {LAYERS.map((l, i, arr) => (
            <React.Fragment key={l.id}>
              <span style={{ color: LC_COLOR[getKey(l.lc)], fontFamily:'JetBrains Mono,monospace', fontSize:12, fontWeight:700 }}>
                {l.name}
              </span>
              {i < arr.length - 1 && <span className="if-arr">→</span>}
            </React.Fragment>
          ))}
        </div>

        {/* src/ root */}
        <div className="src-row">
          <span style={{ fontSize:22 }}>📁</span>
          <span className="src-label">src/</span>
          <span style={{ fontSize:11, color:'var(--muted)', marginLeft:6 }}>корень React-проекта</span>
        </div>

        {/* Layers */}
        {LAYERS.map((layer, li) => {
          const isOpen = open === layer.id;
          return (
            <div key={layer.id} className={cn('fsd-layer', layer.lc)} style={{ marginBottom: li === LAYERS.length - 1 ? 0 : 18 }}>
              {/* Clickable header */}
              <div className="lhd" onClick={() => toggle(layer.id)}>
                <div className="lbar" />
                <span style={{ fontSize:18 }}>{layer.icon}</span>
                <span className="lname">{layer.name}</span>
                <span className="lnum">[{layer.num}]</span>
                <span className="ldesc">{layer.desc}</span>
                <span className="lrule">{layer.rule}</span>
                <span className="larr" style={{ transform: isOpen ? 'rotate(90deg)' : 'none' }}>▸</span>
              </div>

              {/* Expandable nodes */}
              {isOpen && (
                <div className="lnodes">
                  <div className="lline"><div className="llinev" /></div>
                  <div className="nl">
                    {layer.nodes.map(n => (
                      <div key={n.name} className="nd">
                        <span className="nd-ico">{n.ico}</span>
                        <span className="nd-name">{n.name}</span>
                        <span className="nd-path">{n.path}</span>
                        <span className="nd-badge">{n.badge}</span>
                        <span className="nd-desc">{n.desc}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {/* Backend section */}
        <div style={{ marginTop:28, borderTop:'1px solid var(--b2)', paddingTop:24 }}>
          <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:6 }}>
            <span style={{ fontSize:20 }}>🖥️</span>
            <span style={{ fontSize:14, fontWeight:700, fontFamily:'JetBrains Mono,monospace', color:'var(--ink)' }}>backend/</span>
            <span style={{ fontSize:11, color:'var(--muted)' }}>Node.js + Express · 3-слойная архитектура</span>
          </div>
          <div className="be-grid">
            {[
              { ico:'🛣️', name:'routes/',       desc:'Маршрутизация API' },
              { ico:'🎮', name:'controllers/',  desc:'req/res → service' },
              { ico:'⚙️', name:'services/',     desc:'Бизнес-логика, валидация' },
              { ico:'🗄️', name:'repositories/', desc:'Данные → Prisma ORM' },
              { ico:'🔐', name:'middleware/',   desc:'JWT + requireRole()' },
              { ico:'📋', name:'lib/db.js',     desc:'Seed-данные → PostgreSQL' },
            ].map(n => (
              <div key={n.name} className="be-card">
                <span style={{ fontSize:18 }}>{n.ico}</span>
                <div>
                  <div className="be-card-name">{n.name}</div>
                  <div className="be-card-desc">{n.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Principle cards */}
      <div className="pcards">
        {[
          { ico:'🚫', t:'Запрет импортов снизу вверх',   d:'pages не может импортировать из соседнего widgets' },
          { ico:'📦', t:'Публичный API через index.ts',  d:'Каждый слайс экспортирует только свой index' },
          { ico:'🔀', t:'Слайсы изолированы по домену',  d:'listing/, booking/ — независимы и взаимозаменяемы' },
          { ico:'♻️', t:'shared — без бизнес-логики',    d:'Только переиспользуемый код, никаких доменных зависимостей' },
        ].map(c => (
          <div key={c.t} className="pcard-item">
            <div className="pcard-item-ico">{c.ico}</div>
            <div className="pcard-item-t">{c.t}</div>
            <div className="pcard-item-d">{c.d}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// widgets/CartPanel — боковая корзина
// ════════════════════════════════════════════════════════
function CartPanel({ onClose, onCheckout }) {
  const { cart, cartActions } = useStore();
  const total   = cartActions.total();
  const totalN  = cart.reduce((s, i) => s + nights(i.from, i.to), 0);
  const td = today();

  return (
    <div className="cart-ov" onClick={onClose}>
      <div className="cart-panel" onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div className="cp-head">
          <div>
            <div className="cp-title">Корзина</div>
            <div className="cp-count">{cart.length} объект{cart.length === 1 ? '' : 'ов'}</div>
          </div>
          <button className="cp-x" onClick={onClose}>×</button>
        </div>

        {/* Items */}
        <div className="cp-body">
          {cart.length === 0 && (
            <div className="cp-empty">
              <div className="cp-empty-ico">🛒</div>
              <div style={{ fontSize:17, fontWeight:700, color:'var(--ink)', marginBottom:7 }}>Корзина пуста</div>
              <div style={{ fontSize:13, color:'var(--muted)' }}>Добавьте объекты из каталога</div>
            </div>
          )}

          {/* .map() из лекции — рендерим элементы корзины */}
          {cart.map(({ h, from, to }) => {
            const n   = nights(from, to);
            const sub = h.price * n;
            return (
              <div key={h.id} className="ci">
                <div className="ci-top">
                  <div>
                    <div className="ci-name">{h.emoji} {h.name}</div>
                    <div className="ci-sub">📍 {h.city} · {h.type} · {fmt(h.price)}/ночь</div>
                  </div>
                  <button className="ci-rm" onClick={() => cartActions.remove(h.id)}>×</button>
                </div>

                <div className="ci-dates">
                  <div className="ci-df">
                    <div className="ci-dl">Заезд</div>
                    <input type="date" className="ci-di" value={from} min={td}
                      onChange={e => cartActions.upd(h.id, 'from', e.target.value)} />
                  </div>
                  <div className="ci-df">
                    <div className="ci-dl">Выезд</div>
                    <input type="date" className="ci-di" value={to} min={from || td}
                      onChange={e => cartActions.upd(h.id, 'to', e.target.value)} />
                  </div>
                </div>

                <div className="ci-foot">
                  <div className="ci-nights">
                    {n > 0 ? `${n} ночей × ${fmt(h.price)}` : '⚠ Укажите даты'}
                  </div>
                  <div className="ci-total">{n > 0 ? fmt(sub) : '—'}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer — только если есть объекты */}
        {cart.length > 0 && (
          <div className="cp-foot">
            <div className="cp-sum">
              <div className="csr">
                <span>Объектов</span>
                <span>{cart.length}</span>
              </div>
              <div className="csr">
                <span>Итого ночей</span>
                <span>{totalN}</span>
              </div>
              <div className="csr" style={{ borderTop:'1px solid var(--b1)', paddingTop:10, marginTop:10 }}>
                <span style={{ fontWeight:700, color:'var(--ink)' }}>К оплате</span>
                <span className="cstot">{fmt(total)}</span>
              </div>
            </div>
            <button
              className="cobtn"
              onClick={onCheckout}
              disabled={totalN === 0}
            >
              {totalN === 0
                ? 'Укажите даты для всех объектов'
                : `Оформить бронирование — ${fmt(total)}`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// pages/ListingDetailPage — детальная карточка объекта
// ════════════════════════════════════════════════════════
function ListingDetailPage({ home, onBack, onAdd }) {
  const { cartActions } = useStore();
  const inCart = cartActions.has(home.id);
  const [form, setForm] = useState({ from: today(), to: tmrw() });
  const [booked, setBooked] = useState(false);
  const n = nights(form.from, form.to);
  const total = n * home.price;

  const handleBook = () => {
    if (n <= 0) return;
    if (!inCart) cartActions.add(home);
    // Update dates
    cartActions.upd(home.id, 'from', form.from);
    cartActions.upd(home.id, 'to', form.to);
    setBooked(true);
  };

  return (
    <div className="wrap sec z" style={{ maxWidth: 900, margin: '0 auto' }}>
      <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--v3)', cursor:'pointer', fontSize:14, fontWeight:600, marginBottom:24, display:'flex', alignItems:'center', gap:6 }}>
        ← Назад к каталогу
      </button>

      {/* Hero image */}
      <div style={{ height:280, background:home.bg, borderRadius:'var(--r4)', border:'1px solid var(--b2)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:28, position:'relative', overflow:'hidden' }}>
        <div style={{ fontSize:120, opacity:.09, filter:'blur(3px)' }}>{home.emoji}</div>
        <div style={{ position:'absolute', top:16, left:16, display:'flex', gap:8 }}>
          <div className="pc-city">📍 {home.city}</div>
          <div style={{ fontFamily:'JetBrains Mono,monospace', fontSize:10, background:'rgba(0,0,0,.65)', backdropFilter:'blur(6px)', border:'1px solid var(--b2)', borderRadius:100, padding:'4px 10px', color:'var(--v3)' }}>
            {home.type}
          </div>
        </div>
        {home.hot && <div className="pc-hot">🔥 Хит сезона</div>}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 340px', gap:28, alignItems:'start' }}>
        {/* Left column */}
        <div>
          <h1 style={{ fontSize:28, fontWeight:800, letterSpacing:'-0.5px', marginBottom:10 }}>{home.name}</h1>
          <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:18, flexWrap:'wrap' }}>
            <span style={{ fontSize:13, color:'var(--dim)' }}>📍 {home.addr}</span>
            <span style={{ fontSize:13, color:'var(--am)', fontWeight:600 }}>★ {home.rating}</span>
            <span style={{ fontSize:13, color:'var(--muted)' }}>({home.rev} отзывов)</span>
          </div>
          <p style={{ fontSize:15, color:'var(--dim)', lineHeight:1.8, marginBottom:24 }}>
            Добро пожаловать в {home.name}! Уникальный объект в самом сердце {home.city}.
            Идеально подходит для отдыха, командировок и романтических поездок.
            Полностью оснащён всем необходимым для комфортного проживания.
          </p>

          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:12, color:'var(--ink)' }}>Удобства</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {home.am.map(a => (
                <div key={a} style={{ background:'var(--s2)', border:'1px solid var(--b2)', borderRadius:'var(--r2)', padding:'8px 14px', fontSize:13, display:'flex', alignItems:'center', gap:6 }}>
                  <span>✓</span> {a}
                </div>
              ))}
            </div>
          </div>

          <div style={{ background:'var(--s2)', border:'1px solid var(--b1)', borderRadius:'var(--r3)', padding:18 }}>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:10, color:'var(--dim)' }}>📍 На карте</div>
            <div style={{ fontSize:12, color:'var(--muted)', marginBottom:8 }}>
              Координаты: {home.lat}°N, {home.lng}°E
            </div>
            <a href={`https://www.google.com/maps/search/?api=1&query=${home.lat},${home.lng}`}
              target="_blank" rel="noopener noreferrer"
              style={{ color:'var(--v3)', fontSize:13, textDecoration:'none', fontWeight:600 }}>
              Открыть в Google Maps →
            </a>
          </div>
        </div>

        {/* Right column — booking widget */}
        <div style={{ background:'var(--s1)', border:'1px solid var(--b2)', borderRadius:'var(--r4)', padding:22, position:'sticky', top:80 }}>
          <div style={{ fontSize:24, fontWeight:800, marginBottom:4 }}>
            {fmt(home.price)}
            <span style={{ fontSize:13, fontWeight:400, color:'var(--muted)' }}> / ночь</span>
          </div>
          <div style={{ fontSize:12, color:'var(--am)', fontWeight:600, marginBottom:20 }}>★ {home.rating} · {home.rev} отзывов</div>

          {booked ? (
            <div style={{ textAlign:'center', padding:'20px 0' }}>
              <div style={{ fontSize:44, marginBottom:12 }}>🎉</div>
              <div style={{ fontSize:16, fontWeight:700, marginBottom:6 }}>Добавлено в корзину!</div>
              <div style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>{form.from} — {form.to} · {fmt(total)}</div>
              <button onClick={onBack} style={{ background:'var(--grad)', border:'none', color:'#fff', padding:'10px 22px', borderRadius:'var(--r3)', fontWeight:700, cursor:'pointer', fontSize:14 }}>
                Продолжить выбор
              </button>
            </div>
          ) : (
            <>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14 }}>
                <div>
                  <div style={{ fontSize:10, color:'var(--muted)', fontWeight:600, letterSpacing:'.8px', textTransform:'uppercase', marginBottom:5 }}>Заезд</div>
                  <input type="date" className="ci-di" value={form.from} min={today()}
                    onChange={e => setForm(f => ({ ...f, from: e.target.value }))} />
                </div>
                <div>
                  <div style={{ fontSize:10, color:'var(--muted)', fontWeight:600, letterSpacing:'.8px', textTransform:'uppercase', marginBottom:5 }}>Выезд</div>
                  <input type="date" className="ci-di" value={form.to} min={form.from || today()}
                    onChange={e => setForm(f => ({ ...f, to: e.target.value }))} />
                </div>
              </div>

              {n > 0 && (
                <div style={{ background:'rgba(124,92,252,.08)', border:'1px solid rgba(124,92,252,.2)', borderRadius:'var(--r2)', padding:'12px 14px', marginBottom:14 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:'var(--dim)', marginBottom:6 }}>
                    <span>{fmt(home.price)} × {n} ночей</span>
                    <span>{fmt(total)}</span>
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--b1)', paddingTop:8 }}>
                    <span style={{ fontWeight:700, color:'var(--ink)', fontSize:14 }}>Итого</span>
                    <span style={{ fontSize:18, fontWeight:800, background:'var(--grad)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>
                      {fmt(total)}
                    </span>
                  </div>
                </div>
              )}

              <button
                onClick={handleBook}
                disabled={n <= 0}
                style={{ width:'100%', padding:'13px', borderRadius:'var(--r3)', border:'none', background: n > 0 ? 'var(--grad)' : 'var(--s3)', color: n > 0 ? '#fff' : 'var(--muted)', fontSize:15, fontWeight:700, cursor: n > 0 ? 'pointer' : 'not-allowed', transition:'filter .2s, transform .2s' }}
              >
                {n > 0 ? `В корзину — ${fmt(total)}` : 'Выберите даты'}
              </button>

              <div style={{ fontSize:11, color:'var(--muted)', textAlign:'center', marginTop:10 }}>
                Бесплатная отмена · Нет скрытых платежей
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// pages/AuthPage — вход / регистрация
// ════════════════════════════════════════════════════════
function AuthPage({ onBack }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ email: '', password: '', name: '' });
  const [error, setError] = useState('');
  const [done, setDone] = useState(false);

  const DEMO = [
    { label:'USER',  email:'user@bookspace.ru',  pass:'user123' },
    { label:'OWNER', email:'owner@bookspace.ru', pass:'owner123' },
    { label:'ADMIN', email:'admin@bookspace.ru', pass:'admin123' },
  ];

  const handle = () => {
    if (!form.email || !form.password) { setError('Заполните все поля'); return; }
    if (tab === 'register' && !form.name) { setError('Введите имя'); return; }
    setError('');
    setDone(true);
  };

  return (
    <div style={{ minHeight:'calc(100vh - 64px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'32px 16px' }}>
      <div style={{ background:'var(--s1)', border:'1px solid var(--b2)', borderRadius:'var(--r5)', padding:'36px 32px', width:'100%', maxWidth:420 }}>
        <div style={{ fontSize:22, fontWeight:900, textAlign:'center', marginBottom:28, background:'var(--grad)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>
          BookSpace
        </div>

        {done ? (
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div style={{ fontSize:48, marginBottom:14 }}>✅</div>
            <div style={{ fontSize:18, fontWeight:700, marginBottom:8 }}>
              {tab === 'login' ? 'Добро пожаловать!' : 'Аккаунт создан!'}
            </div>
            <div style={{ fontSize:13, color:'var(--muted)', marginBottom:20 }}>{form.email}</div>
            <button onClick={onBack} style={{ background:'var(--grad)', border:'none', color:'#fff', padding:'11px 28px', borderRadius:'var(--r3)', fontWeight:700, cursor:'pointer', fontSize:14 }}>
              На главную
            </button>
          </div>
        ) : (
          <>
            {/* Tabs */}
            <div style={{ display:'flex', background:'var(--s2)', borderRadius:'var(--r1)', padding:3, marginBottom:24 }}>
              {[['login','Войти'],['register','Регистрация']].map(([t, l]) => (
                <button key={t} onClick={() => { setTab(t); setError(''); }}
                  style={{ flex:1, padding:9, fontSize:13, fontWeight:600, borderRadius:'var(--r1)', border:'none', background: tab===t ? 'var(--s1)' : 'none', color: tab===t ? 'var(--ink)' : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                  {l}
                </button>
              ))}
            </div>

            {tab === 'register' && (
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, letterSpacing:'.8px', textTransform:'uppercase', marginBottom:5 }}>Имя</div>
                <input className="ci-di" style={{ width:'100%' }} placeholder="Ваше имя"
                  value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
              </div>
            )}

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, letterSpacing:'.8px', textTransform:'uppercase', marginBottom:5 }}>Email</div>
              <input className="ci-di" style={{ width:'100%' }} type="email" placeholder="email@example.com"
                value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} />
            </div>

            <div style={{ marginBottom:20 }}>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, letterSpacing:'.8px', textTransform:'uppercase', marginBottom:5 }}>Пароль</div>
              <input className="ci-di" style={{ width:'100%' }} type="password" placeholder="••••••••"
                value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))}
                onKeyDown={e => e.key === 'Enter' && handle()} />
            </div>

            {error && <div style={{ background:'rgba(244,63,94,.1)', border:'1px solid rgba(244,63,94,.3)', borderRadius:'var(--r1)', padding:'9px 14px', fontSize:13, color:'#fda4af', marginBottom:14 }}>⚠ {error}</div>}

            <button onClick={handle} style={{ width:'100%', padding:'13px', borderRadius:'var(--r3)', border:'none', background:'var(--grad)', color:'#fff', fontSize:15, fontWeight:700, cursor:'pointer' }}>
              {tab === 'login' ? 'Войти' : 'Создать аккаунт'}
            </button>

            {/* Demo accounts */}
            <div style={{ marginTop:22, paddingTop:18, borderTop:'1px solid var(--b1)' }}>
              <div style={{ fontSize:11, color:'var(--muted)', marginBottom:10, textAlign:'center', fontWeight:600, letterSpacing:'.5px', textTransform:'uppercase' }}>Тестовые аккаунты</div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {DEMO.map(d => (
                  <button key={d.label} onClick={() => setForm(f => ({ ...f, email: d.email, password: d.pass }))}
                    style={{ background:'var(--s2)', border:'1px solid var(--b1)', borderRadius:'var(--r1)', padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer', transition:'border-color .15s', color:'var(--ink)' }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(124,92,252,.35)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--b1)'}>
                    <span style={{ fontFamily:'JetBrains Mono,monospace', fontSize:11, color:'var(--v3)', fontWeight:700 }}>{d.label}</span>
                    <span style={{ fontSize:12, color:'var(--muted)' }}>{d.email}</span>
                    <span style={{ fontSize:11, color:'var(--muted)' }}>{d.pass}</span>
                  </button>
                ))}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// app/router — корневой компонент
// ════════════════════════════════════════════════════════
function App() {
  const [page,      setPage     ] = useState('home');
  const [detail,    setDetail   ] = useState(null);   // выбранный объект
  const [cartOpen,  setCartOpen ] = useState(false);
  const [toast,     setToast    ] = useState(null);

  const show = (msg, type = 'ok') => setToast({ msg, type });

  const openDetail = (home) => { setDetail(home); setPage('detail'); };
  const backHome   = ()     => { setDetail(null);  setPage('home');  };

  const handleAdd = name => show(`«${name}» добавлен в корзину`, 'cart');

  const handleCheckout = () => {
    setCartOpen(false);
    show('Бронирование оформлено! Подтверждение отправлено на email.', 'ok');
  };

  return (
    <Store>
      <AppInner
        page={page} setPage={setPage}
        detail={detail} openDetail={openDetail} backHome={backHome}
        cartOpen={cartOpen} setCartOpen={setCartOpen}
        toast={toast} setToast={setToast}
        handleAdd={handleAdd} handleCheckout={handleCheckout}
      />
    </Store>
  );
}

function AppInner({ page, setPage, detail, openDetail, backHome, cartOpen, setCartOpen, toast, setToast, handleAdd, handleCheckout }) {
  return (
    <>
      <Header page={page} setPage={p => { setPage(p); }} openCart={() => setCartOpen(true)} />

      {page === 'home'   && <HomePage   onAdd={handleAdd} onOpen={openDetail} />}
      {page === 'detail' && detail && <ListingDetailPage home={detail} onBack={backHome} onAdd={handleAdd} />}
      {page === 'map'    && <MapPage    onOpen={openDetail} />}
      {page === 'fsd'    && <FSDPage    />}
      {page === 'auth'   && <AuthPage   onBack={() => setPage('home')} />}

      {cartOpen && (
        <CartPanel
          onClose={() => setCartOpen(false)}
          onCheckout={handleCheckout}
        />
      )}

      {toast && (
        <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
